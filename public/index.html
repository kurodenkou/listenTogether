<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>listenTogether</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Join Screen ──────────────────────────────────────────────────────── -->
  <div id="join-screen">
    <div class="join-card">
      <div class="join-logo">♫</div>
      <h1>listenTogether</h1>
      <p>Join a room to listen with friends in sync</p>
      <input id="username-input" type="text" placeholder="Your name" maxlength="30" autocomplete="off">
      <input id="room-input"     type="text" placeholder="Room name" maxlength="30" autocomplete="off">
      <button id="join-btn">Join Room</button>
    </div>
  </div>

  <!-- ── Main Screen ──────────────────────────────────────────────────────── -->
  <div id="main-screen" class="hidden">

    <header>
      <div class="header-left">
        <span class="logo-mark">♫</span>
        <span class="app-name">listenTogether</span>
        <span id="room-badge" class="room-badge"></span>
      </div>
      <div class="header-right">
        <div id="listeners-wrap" class="listeners-wrap" title="Listeners in room"></div>
        <button id="leave-btn" class="leave-btn">Leave</button>
      </div>
    </header>

    <div class="layout">

      <!-- Library sidebar -->
      <aside class="library">
        <div class="library-header">
          <span class="library-title">Library</span>
          <div class="library-actions">
            <button id="sync-btn" class="icon-btn sync-btn" title="Force sync">&#8635;</button>
            <button id="upload-toggle-btn" class="icon-btn upload-toggle-btn" title="Upload track">＋</button>
          </div>
        </div>

        <!-- Upload panel (hidden by default) -->
        <div id="upload-panel" class="upload-panel hidden">
          <p class="upload-hint">Metadata is read from the file automatically.</p>
          <label class="file-label">
            <span id="file-label-text">Choose audio file…</span>
            <input id="upload-file" type="file" accept="audio/*" multiple>
          </label>
          <div class="upload-actions">
            <button id="upload-confirm-btn">Upload</button>
            <button id="upload-cancel-btn">Cancel</button>
          </div>
          <p id="upload-status" class="upload-status hidden"></p>
        </div>

        <ul id="track-list" class="track-list">
          <li class="track-empty">No tracks yet — upload some music!</li>
        </ul>
      </aside>

      <!-- Player -->
      <section class="player">
        <div class="album-art" id="album-art">
          <img id="cover-img" class="cover-img hidden" alt="Album art">
          <span class="album-art-icon" id="album-art-icon">♫</span>
        </div>

        <div class="track-meta">
          <div id="track-title-display"  class="track-title">No track selected</div>
          <div id="track-artist-display" class="track-artist">—</div>
        </div>

        <!-- Playback controls -->
        <div class="controls">
          <button id="prev-btn"       class="ctrl-btn"      title="Previous">&#9198;</button>
          <button id="play-pause-btn" class="ctrl-btn play" title="Play / Pause">&#9654;</button>
          <button id="next-btn"       class="ctrl-btn"      title="Next">&#9197;</button>
        </div>

        <!-- Progress bar -->
        <div class="progress-section">
          <span id="time-current" class="time-label">0:00</span>
          <div id="progress-wrap" class="progress-wrap">
            <div class="progress-track">
              <div id="progress-fill"  class="progress-fill"></div>
              <div id="progress-thumb" class="progress-thumb"></div>
            </div>
          </div>
          <span id="time-total" class="time-label">0:00</span>
        </div>

        <!-- Volume -->
        <div class="volume-section">
          <span class="vol-icon">&#128264;</span>
          <input id="volume-slider" type="range" min="0" max="1" step="0.02" value="0.8">
          <span class="vol-icon">&#128266;</span>
        </div>
      </section>

    </div><!-- .layout -->
  </div><!-- #main-screen -->

  <audio id="audio-el" preload="metadata"></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
